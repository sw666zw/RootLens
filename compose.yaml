services:
  postgres:
    image: postgres:17-alpine
    container_name: rootlens-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rootlens_inventory}
      POSTGRES_USER: ${POSTGRES_USER:-rootlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rootlens_dev_password}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
