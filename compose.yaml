services:
  postgres:
    image: postgres:17-alpine
    container_name: rootlens-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rootlens_inventory}
      POSTGRES_USER: ${POSTGRES_USER:-rootlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rootlens_dev_password}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rootlens

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: rootlens-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - rootlens

  grafana:
    image: grafana/grafana:12.4.3
    container_name: rootlens-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-rootlens_local_only}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - rootlens

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  rootlens:
